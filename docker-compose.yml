services:
  portal-api:
    build:
      context: ./am-client-portal-api
      dockerfile: Dockerfile
    container_name: client-portal-api
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-client_portal}
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.portal-api.rule=Host(`portal-api.advancedmarketing.co`)"
      - "traefik.http.routers.portal-api.tls=true"
      - "traefik.http.routers.portal-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.portal-api.loadbalancer.server.port=3001"
    networks:
      - coolify

  portal:
    build:
      context: ./am-client-portal
      dockerfile: Dockerfile
    container_name: client-portal
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      portal-api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.portal.rule=Host(`client.advancedmarketing.co`)"
      - "traefik.http.routers.portal.tls=true"
      - "traefik.http.routers.portal.tls.certresolver=letsencrypt"
      - "traefik.http.services.portal.loadbalancer.server.port=80"
    networks:
      - coolify

networks:
  coolify:
    external: true
